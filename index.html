<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>Gestión Reparaciones - FIX FINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; position: relative; padding-top: 160px; padding-bottom: 20px; }
        .hidden { display: none !important; }
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); }
        .search-box { display: flex; gap: 8px; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; background: #1d2a33; border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none; margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-size: 0.85em; color: #8696a0; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); }
        .hist-item { background: #1a242d; padding: 10px; margin-top: 8px; border-radius: 6px; font-size: 0.9em; border-left: 3px solid var(--primary); }
    </style>
</head>
<body>
    <div class="wrap">
        <header class="main-header">
            <h2 style="display:flex; justify-content:space-between; align-items:center">
                Reparaciones <button class="btn btn-primary" id="btn-refresh"><i class="fas fa-sync"></i></button>
            </h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Buscar UF o Propietario..." style="margin-bottom:0">
                <button class="btn btn-primary" id="btn-search"><i class="fas fa-search"></i></button>
                <button class="btn btn-danger" id="btn-clear"><i class="fas fa-times"></i></button>
            </div>
        </header>
        <div id="listado">Cargando unidades...</div>
    </div>

    <div id="modal-edit" class="modal hidden">
        <div class="modal-content">
            <h3 id="m-title" style="margin-bottom:15px; color:var(--primary)">Editar</h3>
            
            <label>Descripción:</label>
            <textarea id="r-descripcion" rows="3"></textarea>
            
            <label>Ejecutor:</label>
            <input type="text" id="r-ejecutor">
            
            <label>Garantía:</label>
            <input type="text" id="r-garantia">
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div>
                    <label>Estado:</label>
                    <select id="r-estado">
                        <option value="Pendiente">Pendiente</option>
                        <option value="En Proceso">En Proceso</option>
                        <option value="Terminado">Terminado</option>
                    </select>
                </div>
                <div>
                    <label>Responsable:</label>
                    <select id="r-responsable">
                        <option value="Consorcio">Consorcio</option>
                        <option value="Propietario">Propietario</option>
                    </select>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:15px">
                <button class="btn btn-danger" style="flex:1" onclick="document.getElementById('modal-edit').classList.add('hidden')">Cerrar</button>
                <button class="btn btn-primary" style="flex:1" onclick="window.saveRep()">Guardar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, updateDoc, doc, addDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo",
            authDomain: "gestionuf-remoto.firebaseapp.com",
            projectId: "gestionuf-remoto",
            storageBucket: "gestionuf-remoto.appspot.com",
            messagingSenderId: "724452752860",
            appId: "1:724452752860:web:4d25585addcdcbd146e319"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let departamentos = [];
        let currentUFId = null;
        let currentRepDocId = null;

        window.loadData = async () => {
            const list = document.getElementById("listado");
            list.innerHTML = "Actualizando...";
            try {
                const snap = await getDocs(query(collection(db, "departamentos"), orderBy("UF", "asc")));
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            } catch (e) { console.error(e); }
        };

        function render(data) {
            const list = document.getElementById("listado");
            list.innerHTML = data.length ? "" : "Sin resultados";
            data.forEach(d => {
                list.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:start">
                            <div>
                                <h3 style="color:var(--primary)">UF ${d.UF}</h3>
                                <p>${d.Propietario || '---'}</p>
                            </div>
                            <div style="display:flex; gap:8px">
                                <button class="btn btn-primary" onclick="window.openEdit('${d.id}', '${d.UF}')"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-primary" onclick="window.verHist('${d.id}')"><i class="fas fa-history"></i></button>
                            </div>
                        </div>
                        <div id="det-${d.id}" class="hidden" style="margin-top:10px; border-top:1px solid var(--border); padding-top:10px"></div>
                    </div>`;
            });
        }

        window.openEdit = async (id, uf) => {
            currentUFId = id;
            currentRepDocId = null;
            document.getElementById("m-title").innerText = "Editar UF " + uf;
            
            // Limpiar campos antes de la carga
            document.getElementById("r-descripcion").value = "";
            document.getElementById("r-ejecutor").value = "";
            document.getElementById("r-garantia").value = "";
            document.getElementById("r-estado").value = "Pendiente";
            document.getElementById("r-responsable").value = "Consorcio";
            
            document.getElementById("modal-edit").classList.remove("hidden");

            try {
                const q = query(collection(db, "reparaciones"), where("id_uf", "==", id));
                const snap = await getDocs(q);
                
                if (!snap.empty) {
                    // CAMBIO CLAVE: Iteramos sobre los docs para evitar el error de función
                    snap.forEach((docSnapshot) => {
                        if (!currentRepDocId) { // Solo tomamos el primero
                            const r = docSnapshot.data();
                            currentRepDocId = docSnapshot.id;

                            document.getElementById("r-descripcion").value = r.descripcion || "";
                            document.getElementById("r-ejecutor").value = r.ejecutor || "";
                            document.getElementById("r-garantia").value = r.garantia || "";
                            document.getElementById("r-estado").value = r.estado || "Pendiente";
                            document.getElementById("r-responsable").value = r.responsable || "Consorcio";
                        }
                    });
                }
            } catch (e) {
                console.error("Error en openEdit:", e);
            }
        };

        window.saveRep = async () => {
            const data = {
                id_uf: currentUFId,
                descripcion: document.getElementById("r-descripcion").value,
                ejecutor: document.getElementById("r-ejecutor").value,
                garantia: document.getElementById("r-garantia").value,
                estado: document.getElementById("r-estado").value,
                responsable: document.getElementById("r-responsable").value,
                fecha: new Date().toLocaleDateString()
            };

            try {
                if (currentRepDocId) {
                    await updateDoc(doc(db, "reparaciones", currentRepDocId), data);
                } else {
                    await addDoc(collection(db, "reparaciones"), data);
                }
                document.getElementById("modal-edit").classList.add("hidden");
                alert("Guardado");
                window.loadData();
            } catch (e) { alert("Error al guardar"); }
        };

        window.verHist = async (id) => {
            const el = document.getElementById("det-" + id);
            el.classList.toggle("hidden");
            if(!el.classList.contains("hidden")) {
                el.innerHTML = "<small>Cargando...</small>";
                try {
                    const q = query(collection(db, "reparaciones"), where("id_uf", "==", id));
                    const snap = await getDocs(q);
                    el.innerHTML = snap.empty ? "Sin registros" : "";
                    snap.forEach(ds => {
                        const r = ds.data();
                        el.innerHTML += `<div class="hist-item"><b>${r.fecha}:</b> ${r.descripcion}</div>`;
                    });
                } catch (e) { el.innerHTML = "Error al cargar historial"; }
            }
        };

        document.getElementById("btn-search").onclick = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            render(departamentos.filter(d => d.UF.toString().toLowerCase().includes(v) || d.Propietario.toLowerCase().includes(v)));
        };
        document.getElementById("btn-clear").onclick = () => { document.getElementById("search-input").value = ""; render(departamentos); };
        document.getElementById("btn-refresh").onclick = () => window.loadData();

        window.loadData();
    </script>
</body>
</html>
