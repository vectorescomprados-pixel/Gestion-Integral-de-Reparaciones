<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - Enterprise Gold</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2563eb; --danger: #e11d48; --text: #1f293b; --border: #e5e7eb; --warning: #f59e0b; --success: #22c55e; }
        body.dark-mode { --bg: #0b141a; --card: #111b21; --text: #e9edef; --border: #222d34; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        
        /* HEADER */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .content-body { margin-top: 230px; width: 100%; padding-bottom: 100px; }
        
        /* BOTONES */
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #64748b; }
        
        /* TARJETAS ESTILO FOTO */
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); width: 100%; }
        .item b { font-size: 16px; color: var(--primary); display: block; margin-bottom: 5px; }
        .details { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); font-size: 14px; line-height: 1.6; }
        .details b { display: inline; font-size: 14px; }

        /* REPARACIONES */
        .rep-entry { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--primary); }
        .ficha-label { color: var(--primary); font-weight: bold; font-size: 12px; display: block; margin-top: 5px; }

        #btn-rocket { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; border-radius: 50%; z-index: 5000; display: none; align-items: center; justify-content: center; border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
        input, select, textarea { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: #0b141a; color: var(--text); }
    </style>
</head>
<body class="dark-mode">

    <button id="btn-rocket" class="btn primary"><i class="fas fa-rocket"></i></button>

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:20px; color:var(--primary)">Gestión Reparaciones</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">ENTRAR</button>
        </div>
    </div>

    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div class="grid-btns">
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-export" class="btn ghost">RESPALDO</button>
                <button id="btn-logout-trigger" class="btn danger">CERRAR</button>
            </div>
            <input id="search-input" placeholder="Buscar Unidad o Apellido...">
            <div class="grid-btns-2" style="margin-top:0">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
            </div>
        </div>
        <div class="content-body"><div id="list"></div></div>
    </div>

    <div id="modal-logout" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <i class="fas fa-sign-out-alt" style="font-size:40px; color:var(--danger); margin-bottom:15px"></i>
            <h3>Finalizar Sesión</h3>
            <p style="margin:10px 0; font-size:14px; opacity:0.8">¿Desea cerrar el sistema?</p>
            <div class="grid-btns-2">
                <button id="btn-logout-confirm" class="btn danger">SALIR</button>
                <button onclick="cerrarModales()" class="btn ghost">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="modal-edit-rep" class="modal hidden">
        <div class="modal-content">
            <h3 id="rep-title" style="text-align:center; margin-bottom:15px">Reparación</h3>
            <textarea id="r-desc" placeholder="Descripción técnica..."></textarea>
            <input id="r-ejecutor" placeholder="Técnico">
            <select id="r-estado">
                <option value="Pendiente">Estado: Pendiente</option>
                <option value="Terminado">Estado: Terminado</option>
            </select>
            <input id="r-garantia" type="number" placeholder="Meses Garantía">
            <select id="r-resp">
                <option value="Consorcio">Gasto: Consorcio</option>
                <option value="Particular">Gasto: Particular</option>
            </select>
            <textarea id="r-obs" placeholder="Observaciones..."></textarea>
            <div class="grid-btns-2">
                <button id="btn-save-rep" class="btn primary">GUARDAR</button>
                <button onclick="cerrarModales()" class="btn danger">CANCELAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let departamentos = [], currentUFId = null, currentRepId = null;

        // COHETE
        window.onscroll = () => { document.getElementById("btn-rocket").style.display = (window.scrollY > 300) ? "flex" : "none"; };
        document.getElementById("btn-rocket").onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});

        // RENDERIZADO ESTILO FOTO
        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(d => {
                const telActivo = d.TelefonoPropietario || d.TelefonoInquilino || "";
                const div = document.createElement("div");
                div.className = "item";
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || 'S/D'}</small></div>
                        <div style="display:flex; gap:18px; font-size:19px">
                            <i class="fas fa-eye" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden'); cargarHistorial('${d.id}')"></i>
                            <i class="fas fa-tools" style="color:var(--warning)" onclick="window.gestionarReparacion('${d.id}', '${d.UF}')"></i>
                            <i class="fas fa-edit" style="color:var(--primary)" onclick="window.editUF('${d.id}', '${d.UF}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="details hidden">
                        <p><b style="color:var(--primary)">Prop:</b> ${d.Propietario || '---'}</p>
                        <p><b style="color:var(--primary)">Tel:</b> ${d.TelefonoPropietario || 'N/C'}</p>
                        <p><b style="color:var(--primary)">Inq:</b> ${d.Inquilino || '---'}</p>
                        <p><b style="color:var(--primary)">Tel:</b> ${d.TelefonoInquilino || 'N/C'}</p>
                        <div id="hist-${d.id}"></div>
                        <div class="grid-btns-2">
                            <a href="tel:${telActivo}" class="btn primary"><i class="fas fa-phone"></i> LLAMAR</a>
                            <a href="https://wa.me/${telActivo.replace(/\D/g,'')}" target="_blank" class="btn" style="background:#22c55e"><i class="fab fa-whatsapp"></i> CHAT</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // BLOQUEO UF 0003
        window.editUF = (id, uf) => {
            if(uf === "0003") return alert("La UF 0003 está protegida. No se pueden editar los datos de contacto.");
            alert("Función de edición de UF no implementada en este módulo de reparaciones.");
        };

        // GESTIÓN REPARACIONES (CARGA DATOS EXISTENTES)
        window.gestionarReparacion = async (id, uf) => {
            currentUFId = id; currentRepId = null;
            document.getElementById("rep-title").innerText = `Reparación UF: ${uf}`;
            document.querySelectorAll("#modal-edit-rep input, #modal-edit-rep textarea").forEach(i => i.value = "");
            
            const snap = await getDocs(query(collection(db, "reparaciones"), where("id_uf", "==", id)));
            if(!snap.empty) {
                const r = snap.docs.data(); currentRepId = snap.docs.id;
                document.getElementById("r-desc").value = r.descripcion;
                document.getElementById("r-ejecutor").value = r.ejecutor;
                document.getElementById("r-estado").value = r.estado;
                document.getElementById("r-garantia").value = r.garantia;
                document.getElementById("r-resp").value = r.responsable;
                document.getElementById("r-obs").value = r.observaciones;
            }
            document.getElementById("modal-edit-rep").classList.remove("hidden");
        };

        document.getElementById("btn-save-rep").onclick = async () => {
            const r = { id_uf: currentUFId, descripcion: document.getElementById("r-desc").value, ejecutor: document.getElementById("r-ejecutor").value, estado: document.getElementById("r-estado").value, garantia: document.getElementById("r-garantia").value, responsable: document.getElementById("r-resp").value, observaciones: document.getElementById("r-obs").value, fecha: new Date().toLocaleDateString() };
            if(!r.descripcion) return alert("Ingrese descripción");
            if(currentRepId) await updateDoc(doc(db, "reparaciones", currentRepId), r);
            else await addDoc(collection(db, "reparaciones"), r);
            cerrarModales(); alert("Guardado");
        };

        window.cargarHistorial = async (id) => {
            const container = document.getElementById(`hist-${id}`);
            container.innerHTML = "<small>Buscando reparaciones...</small>";
            const snap = await getDocs(query(collection(db, "reparaciones"), where("id_uf", "==", id)));
            container.innerHTML = "";
            snap.forEach(doc => {
                const r = doc.data();
                container.innerHTML += `<div class="rep-entry">
                    <span class="ficha-label">TRABAJO (${r.fecha}):</span> ${r.descripcion}
                    <span class="ficha-label">ESTADO:</span> ${r.estado}
                </div>`;
            });
        };

        // RESPALDO
        document.getElementById("btn-export").onclick = () => {
            const csv = "UF,Propietario,Telefono\n" + departamentos.map(d => `"${d.UF}","${d.Propietario}","${d.TelefonoPropietario}"`).join("\n");
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
            link.download = "Respaldo_Sistema.csv"; link.click();
        };

        // LOGIN Y SYNC
        document.getElementById("btn-login").onclick = async () => {
            const snap = await getDocs(query(collection(db, "usuarios"), where("usuario", "==", document.getElementById("login-user").value), where("password", "==", document.getElementById("login-pass").value)));
            if(!snap.empty){ localStorage.setItem("uf_auth","true"); location.reload(); } else alert("Error");
        };

        if(localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() })); render(departamentos);
            });
        }

        document.getElementById("btn-search").onclick = () => render(departamentos.filter(d => d.UF.toLowerCase().includes(document.getElementById("search-input").value.toLowerCase()) || (d.Propietario||"").toLowerCase().includes(document.getElementById("search-input").value.toLowerCase())));
        document.getElementById("btn-clear").onclick = () => { document.getElementById("search-input").value = ""; render(departamentos); };
        document.getElementById("btn-logout-trigger").onclick = () => document.getElementById("modal-logout").classList.remove("hidden");
        document.getElementById("btn-logout-confirm").onclick = () => { localStorage.clear(); location.reload(); };
        window.cerrarModales = () => document.querySelectorAll(".modal").forEach(m => m.id !== "login-screen" && m.classList.add("hidden"));
        document.getElementById("btn-theme").onclick = () => document.body.classList.toggle("dark-mode");
    </script>
</body>
</html>
