<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>Gestión Reparaciones - Confirmación de Datos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --warning: #f59e0b; --success: #22c55e; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .content-body { margin-top: 230px; width: 100%; padding-bottom: 100px; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #64748b; }
        
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); width: 100%; }
        .item b { font-size: 16px; color: var(--primary); display: block; margin-bottom: 5px; }
        .details { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); font-size: 14px; line-height: 1.6; }
        
        #btn-rocket { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; border-radius: 50%; z-index: 5000; display: none; align-items: center; justify-content: center; border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
        input, select, textarea { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: #0b141a; color: var(--text); }
        textarea { height: 80px; padding: 10px; resize: none; }
        .label-confirm { color: var(--primary); font-weight: bold; font-size: 14px; margin-bottom: 15px; display: block; text-align: center; background: rgba(37, 99, 235, 0.1); padding: 8px; border-radius: 8px; }
    </style>
</head>
<body class="dark-mode">

    <button id="btn-rocket" class="btn primary"><i class="fas fa-rocket"></i></button>

    <div id="main-screen" class="wrap">
        <div class="main-header">
            <div class="grid-btns">
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-export" class="btn ghost">RESPALDO</button>
                <button id="btn-logout" class="btn danger">CERRAR</button>
            </div>
            <input id="search-input" placeholder="Buscar por Unidad o Apellido...">
            <div class="grid-btns-2" style="margin-top:0">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
            </div>
        </div>
        <div class="content-body"><div id="list"></div></div>
    </div>

    <div id="modal-edit" class="modal hidden">
        <div class="modal-content">
            <h3 id="edit-title" style="text-align:center; margin-bottom:5px">Reparación</h3>
            <span id="confirm-owner" class="label-confirm">Propietario: ---</span>
            
            <textarea id="r-desc" placeholder="Descripción técnica..."></textarea>
            <input id="r-ejecutor" placeholder="Técnico / Empresa">
            <select id="r-estado">
                <option value="Pendiente">Estado: Pendiente</option>
                <option value="Terminado">Estado: Terminado</option>
            </select>
            <input id="r-garantia" type="number" placeholder="Garantía (Meses)">
            <select id="r-resp">
                <option value="Consorcio">Gasto: Consorcio</option>
                <option value="Particular">Gasto: Particular</option>
            </select>
            <textarea id="r-obs" placeholder="Observaciones adicionales..."></textarea>
            <div class="grid-btns-2">
                <button id="btn-save" class="btn primary">GUARDAR</button>
                <button onclick="cerrarModales()" class="btn danger">CANCELAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        let departamentos = [], currentUFId = null, currentRepId = null;

        window.onscroll = () => { document.getElementById("btn-rocket").style.display = (window.scrollY > 300) ? "flex" : "none"; };
        document.getElementById("btn-rocket").onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});

        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(d => {
                const tel = d.TelefonoPropietario || d.TelefonoInquilino || "";
                const div = document.createElement("div");
                div.className = "item";
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || 'S/D'}</small></div>
                        <div style="display:flex; gap:20px; font-size:20px">
                            <i class="fas fa-tools" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden')"></i>
                            <i class="fas fa-edit" style="color:var(--primary)" onclick="window.abrirEditor('${d.id}', '${d.UF}', '${d.Propietario}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="details hidden">
                        <p><b style="color:var(--primary)">Prop:</b> ${d.Propietario || '---'}</p>
                        <p><b style="color:var(--primary)">Tel:</b> ${d.TelefonoPropietario || 'N/C'}</p>
                        <p><b style="color:var(--primary)">Inq:</b> ${d.Inquilino || '---'}</p>
                        <p><b style="color:var(--primary)">Tel:</b> ${d.TelefonoInquilino || 'N/C'}</p>
                        <div class="grid-btns-2">
                            <a href="tel:${tel}" class="btn primary"><i class="fas fa-phone"></i> LLAMAR</a>
                            <a href="https://wa.me/${tel.replace(/\D/g,'')}" target="_blank" class="btn" style="background:#22c55e"><i class="fab fa-whatsapp"></i> CHAT</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // ABRIR EDITOR CON VERIFICACIÓN DE PROPIETARIO
        window.abrirEditor = async (id, uf, propietario) => {
            currentUFId = id; currentRepId = null;
            document.getElementById("edit-title").innerText = `Gestionar Reparación UF: ${uf}`;
            document.getElementById("confirm-owner").innerText = `Propietario: ${propietario}`; // MUESTRA NOMBRE PARA CORROBORAR
            
            document.querySelectorAll("#modal-edit input, #modal-edit textarea").forEach(i => i.value = "");
            
            const snap = await getDocs(query(collection(db, "reparaciones"), where("id_uf", "==", id)));
            if(!snap.empty) {
                const r = snap.docs.data(); currentRepId = snap.docs.id;
                document.getElementById("r-desc").value = r.descripcion || "";
                document.getElementById("r-ejecutor").value = r.ejecutor || "";
                document.getElementById("r-estado").value = r.estado || "Pendiente";
                document.getElementById("r-garantia").value = r.garantia || "";
                document.getElementById("r-resp").value = r.responsable || "Consorcio";
                document.getElementById("r-obs").value = r.observaciones || "";
            }
            document.getElementById("modal-edit").classList.remove("hidden");
        };

        document.getElementById("btn-save").onclick = async () => {
            const desc = document.getElementById("r-desc").value;
            if(!desc) return alert("Ingrese descripción");
            const r = { id_uf: currentUFId, descripcion: desc, ejecutor: document.getElementById("r-ejecutor").value, estado: document.getElementById("r-estado").value, garantia: document.getElementById("r-garantia").value, responsable: document.getElementById("r-resp").value, observaciones: document.getElementById("r-obs").value, fecha: new Date().toLocaleDateString() };
            
            if(currentRepId) await updateDoc(doc(db, "reparaciones", currentRepId), r);
            else await addDoc(collection(db, "reparaciones"), r);
            
            cerrarModales(); alert("Guardado correctamente");
        };

        onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
            departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render(departamentos);
        });

        document.getElementById("btn-search").onclick = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            render(departamentos.filter(d => d.UF.toLowerCase().includes(v) || (d.Propietario||"").toLowerCase().includes(v)));
        };
        document.getElementById("btn-clear").onclick = () => { document.getElementById("search-input").value = ""; render(departamentos); };
        document.getElementById("btn-logout").onclick = () => location.reload();
        window.cerrarModales = () => document.getElementById("modal-edit").classList.add("hidden");
        document.getElementById("btn-theme").onclick = () => document.body.classList.toggle("dark-mode");
    </script>
</body>
</html>
