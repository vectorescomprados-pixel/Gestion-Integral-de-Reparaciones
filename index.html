<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - Reparaciones Integrales</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2563eb; --danger: #e11d48; --text: #1f293b; --border: #e5e7eb; --warning: #f59e0b; --success: #22c55e; }
        body.dark-mode { --bg: #0b141a; --card: #111b21; --text: #e9edef; --border: #222d34; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; transition: background 0.2s; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .content-body { margin-top: 380px; width: 100%; padding-bottom: 100px; }
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #64748b; } .warning { background: var(--warning); color: #000; }
        
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); width: 100%; }
        .item.no-phone { border-left: 8px solid var(--warning) !important; }
        .item b { font-size: 16px; color: var(--primary); display: block; margin-bottom: 5px; }
        .details { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); font-size: 14px; line-height: 1.6; }
        
        /* Estilos específicos para Reparaciones */
        .rep-card { border-radius: 10px; padding: 12px; margin-top: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); }
        .rep-terminado { border-left: 5px solid var(--success) !important; }
        .rep-pendiente { border-left: 5px solid var(--danger) !important; }

        input, select, textarea { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: var(--bg); color: var(--text); font-size: 14px; }
        textarea { height: 80px; padding: 10px; }

        #log-panel { background: #000; padding: 12px; font-size: 10px; height: 120px; overflow-y: auto; border-radius: 8px; font-family: 'Courier New', monospace; border: 1px solid #333; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body class="dark-mode">

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:20px; color:var(--primary)">GestiónUF Pro</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">INICIAR SESIÓN</button>
        </div>
    </div>

    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="conn-status" style="font-size:10px; text-align:center; margin-bottom:8px; color:var(--success)">● EN LÍNEA - REPARACIONES ACTIVAS</div>
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">LOGS</button>
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-logout-trigger" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button id="btn-import" class="btn ghost admin-only">IMPORTAR</button>
                <button id="btn-export" class="btn ghost admin-only">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar por Unidad o Apellido...">
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-empty" class="btn warning">SIN DATOS</button>
            </div>
            <button id="btn-delete-all" class="btn danger admin-only" style="width:100%">BORRAR TODA LA NUBE</button>
        </div>

        <div class="content-body">
            <div id="log-container" class="hidden"><div id="log-panel"></div></div>
            <div id="list"></div>
        </div>
    </div>

    <div id="modal-rep" class="modal hidden">
        <div class="modal-content">
            <h3 style="text-align:center; margin-bottom:15px">Registrar Reparación</h3>
            <p id="rep-target-uf" style="text-align:center; font-weight:bold; color:var(--primary); margin-bottom:10px;"></p>
            <textarea id="r-desc" placeholder="Descripción del trabajo técnico..."></textarea>
            <input id="r-ejecutor" placeholder="Quién lo realizó (Nombre/Empresa)">
            <select id="r-estado">
                <option value="Pendiente">Pendiente</option>
                <option value="Terminado">Terminado</option>
            </select>
            <input id="r-garantia" type="number" placeholder="Meses de Garantía (Ej: 6)">
            <select id="r-resp">
                <option value="Consorcio">Responsable: Consorcio</option>
                <option value="Particular">Responsable: Particular</option>
            </select>
            <div class="grid-btns-2">
                <button id="btn-save-rep" class="btn primary">GUARDAR</button>
                <button id="btn-cancel-rep" class="btn danger">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title" style="text-align:center; margin-bottom:15px">Datos de Unidad</h3>
            <input id="f-uf" placeholder="Unidad (Ej: 01-A)">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Tel. Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Tel. Inquilino">
            <div class="grid-btns-2">
                <button id="btn-save" class="btn primary">GUARDAR</button>
                <button id="btn-cancel" class="btn danger">DESCARTAR</button>
            </div>
        </div>
    </div>

    <div id="modal-confirm" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <h3>Seguridad Requerida</h3>
            <p id="confirm-msg" style="margin:10px 0; font-size:13px"></p>
            <input id="confirm-pass" type="password" placeholder="Clave Administrativa">
            <div class="grid-btns-2">
                <button id="btn-confirm-yes" class="btn primary">AUTORIZAR</button>
                <button id="btn-confirm-no" class="btn danger">VOLVER</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // TUS CREDENCIALES
        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let departamentos = [], reparaciones = [], currentUFId = null;
        const MASTER_CODE = "1131552679";

        const writeLog = (msg, type = 'success') => {
            const lp = document.getElementById("log-panel");
            if(lp) { lp.innerHTML += `<div style="color:${type==='err'?'#ff3131':'#00ff41'}">» [${new Date().toLocaleTimeString()}] ${msg}</div>`; lp.scrollTop = lp.scrollHeight; }
        };

        // --- RENDERIZADO PRINCIPAL ---
        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(d => {
                const div = document.createElement("div");
                div.className = `item ${(!d.TelefonoPropietario && !d.TelefonoInquilino) ? 'no-phone' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || 'S/D'}</small></div>
                        <div style="display:flex; gap:15px; font-size:18px">
                            <i class="fas fa-tools" style="color:var(--warning)" onclick="window.openRepModal('${d.id}', '${d.UF}')"></i>
                            <i class="fas fa-eye" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden'); window.loadReps('${d.id}')"></i>
                            <i class="fas fa-edit" style="color:var(--primary)" onclick="window.editUF('${d.id}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="details hidden">
                        <div id="reps-list-${d.id}" style="margin-bottom:15px">Cargando reparaciones...</div>
                        <div class="grid-btns-2">
                            <a href="tel:${d.TelefonoPropietario || d.TelefonoInquilino}" class="btn primary"><i class="fas fa-phone"></i> LLAMAR</a>
                            <a href="https://wa.me/${(d.TelefonoPropietario || d.TelefonoInquilino || '').replace(/\D/g,'')}" target="_blank" class="btn" style="background:#22c55e"><i class="fab fa-whatsapp"></i> CHAT</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // --- GESTIÓN DE REPARACIONES ---
        window.openRepModal = (id, uf) => {
            currentUFId = id;
            document.getElementById("rep-target-uf").innerText = `UF: ${uf}`;
            document.getElementById("modal-rep").classList.remove("hidden");
        };

        document.getElementById("btn-save-rep").onclick = async () => {
            const r = {
                id_uf: currentUFId,
                descripcion: document.getElementById("r-desc").value,
                ejecutor: document.getElementById("r-ejecutor").value,
                estado: document.getElementById("r-estado").value,
                garantia: document.getElementById("r-garantia").value,
                responsable: document.getElementById("r-resp").value,
                fecha: new Date().toLocaleDateString()
            };
            if(!r.descripcion) return alert("Falta descripción");
            await addDoc(collection(db, "reparaciones"), r);
            writeLog(`Reparación añadida a UF`, "success");
            document.getElementById("modal-rep").classList.add("hidden");
        };

        window.loadReps = async (ufId) => {
            const res = await getDocs(query(collection(db, "reparaciones"), where("id_uf", "==", ufId)));
            const container = document.getElementById(`reps-list-${ufId}`);
            container.innerHTML = "<strong>Historial de Reparaciones:</strong>";
            if(res.empty) container.innerHTML += "<p style='font-size:11px; opacity:0.6'>Sin registros.</p>";
            res.forEach(docSnap => {
                const r = docSnap.data();
                container.innerHTML += `
                    <div class="rep-card ${r.estado === 'Terminado' ? 'rep-terminado' : 'rep-pendiente'}">
                        <div style="font-size:11px; display:flex; justify-content:space-between">
                            <span>${r.fecha} - <b>${r.estado}</b></span>
                            <span style="color:var(--primary)">Resp: ${r.responsable}</span>
                        </div>
                        <p style="margin:5px 0">${r.descripcion}</p>
                        <small>Ejecutor: ${r.ejecutor} | Garantía: ${r.garantia} meses</small>
                    </div>`;
            });
        };

        // --- LÓGICA DE LOGIN Y UF (Se mantiene de tu original) ---
        const login = async () => {
            const u = document.getElementById("login-user").value;
            const p = document.getElementById("login-pass").value;
            const qU = query(collection(db, "usuarios"), where("usuario", "==", u), where("password", "==", p));
            const snap = await getDocs(qU);
            if (!snap.empty) { localStorage.setItem("uf_auth", "true"); location.reload(); }
            else alert("Error de acceso");
        };
        document.getElementById("btn-login").onclick = login;

        if(localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            });
        }

        // --- BUSQUEDA ---
        document.getElementById("btn-search").onclick = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            render(departamentos.filter(d => d.UF.toLowerCase().includes(v) || (d.Propietario||"").toLowerCase().includes(v)));
        };

        // --- CIERRE DE MODALES ---
        document.querySelectorAll("#btn-cancel, #btn-cancel-rep, #btn-confirm-no").forEach(b => b.onclick = () => {
            document.querySelectorAll(".modal").forEach(m => m.id !== "login-screen" && m.classList.add("hidden"));
        });

        document.getElementById("btn-logout-trigger").onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById("btn-theme").onclick = () => document.body.classList.toggle("dark-mode");
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-container").classList.toggle("hidden");

    </script>
</body>
</html>
