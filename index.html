<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
    <title>Gestión Reparaciones Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b141a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; 
            --text: #e9edef; --border: #222d34; --success: #22c55e; --warning: #f59e0b;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; scroll-behavior: smooth; }
        .wrap { width: 95%; max-width: 450px; position: relative; padding-top: 170px; padding-bottom: 80px; }
        .hidden { display: none !important; }

        .btn-home {
            position: fixed; top: 15px; left: 15px; z-index: 9999999;
            background: rgba(37, 99, 235, 0.9); color: white; border: none;
            border-radius: 50%; width: 45px; height: 45px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex;
            align-items: center; justify-content: center; text-decoration: none;
        }
        
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); }
        .nav-top { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 15px; }
        
        /* 🔍 BUSCADOR OPTIMIZADO */
        .search-box { display: flex; gap: 5px; align-items: center; }
        .search-box input { flex: 1; margin-bottom: 0; background: #1d2a33; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: #fff; }
        .btn-search-trigger { background: var(--primary); color: white; border: none; border-radius: 8px; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1em; }
        .btn-clear-trigger { background: var(--danger); color: white; border: none; border-radius: 8px; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1em; }
        
        #btn-rocket {
            position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px;
            background: var(--primary); color: white; border-radius: 50%; border: none;
            font-size: 1.5em; cursor: pointer; display: none; z-index: 2000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); align-items: center; justify-content: center;
        }

        input, select, textarea { width: 100%; padding: 12px; background: #1d2a33; border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none; margin-bottom: 10px; font-size: 16px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
        
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }

        .hist-item { background: #1a242d; padding: 12px; margin-top: 8px; border-radius: 8px; font-size: 0.9em; border-left: 5px solid #ccc; }
        .st-pendiente { border-left-color: var(--danger); background: rgba(225,29,72,0.1); }
        .st-en-proceso { border-left-color: var(--warning); background: rgba(245,158,11,0.1); }
        .st-terminado { border-left-color: var(--success); background: rgba(34,197,94,0.1); }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/" class="btn-home">
        <i class="fas fa-home"></i>
    </a>

    <button id="btn-rocket" onclick="window.scrollTo({top:0, behavior:'smooth'})"><i class="fas fa-rocket"></i></button>

    <div class="wrap">
        <header class="main-header">
            <div class="nav-top">
                <h2 style="font-size: 1.1em; color: var(--primary); margin-right: auto; padding-left: 50px;">Reparaciones</h2>
                <button class="btn btn-primary" id="btn-refresh"><i class="fas fa-sync"></i></button>
            </div>
            
            <div class="search-box">
                <input type="text" id="search-input" placeholder="UF, Propietario o Inquilino..." autocomplete="off">
                <button class="btn-clear-trigger" id="btn-clear"><i class="fas fa-times"></i></button>
                <button class="btn-search-trigger" id="btn-do-search"><i class="fas fa-search"></i></button>
            </div>
        </header>
        <div id="listado">Cargando unidades...</div>
    </div>

    <div id="modal-edit" class="modal hidden">
        <div class="modal-content">
            <h3 id="m-title" style="margin-bottom:15px; color:var(--primary)">Trabajo</h3>
            <label>Descripción:</label>
            <textarea id="r-descripcion" rows="3" placeholder="Detalle del problema..."></textarea>
            <label>Técnico / Ejecutor:</label>
            <input type="text" id="r-ejecutor" placeholder="Nombre del profesional">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div>
                    <label>Estado:</label>
                    <select id="r-estado">
                        <option value="Pendiente">Pendiente</option>
                        <option value="En Proceso">En Proceso</option>
                        <option value="Terminado">Terminado</option>
                    </select>
                </div>
                <div>
                    <label>Responsable:</label>
                    <select id="r-responsable">
                        <option value="Consorcio">Consorcio</option>
                        <option value="Propietario">Propietario</option>
                        <option value="Empleado">Empleado</option>
                    </select>
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:15px">
                <button class="btn btn-danger" style="flex:1" onclick="window.closeModal()">Cerrar</button>
                <button class="btn btn-success" style="flex:1" id="btn-guardar-principal">Guardar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, query, where, updateDoc, doc, addDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const CODIGO_MAESTRO = "4750"; 
        const firebaseConfig = {
            apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo",
            authDomain: "gestionuf-remoto.firebaseapp.com",
            projectId: "gestionuf-remoto"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let departamentos = [];
        let currentUFId = null;
        let currentRepDocId = null;

        window.onscroll = () => {
            const btn = document.getElementById("btn-rocket");
            btn.style.display = window.scrollY > 300 ? "flex" : "none";
        };

        window.loadData = async () => {
            const list = document.getElementById("listado");
            list.innerHTML = "<p style='text-align:center; padding:20px'>Cargando base de datos...</p>";
            try {
                const snap = await getDocs(query(collection(db, "departamentos"), orderBy("UF", "asc")));
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            } catch (e) { console.error(e); }
        };

        function render(data) {
            const list = document.getElementById("listado");
            list.innerHTML = data.length ? "" : "<p style='text-align:center; padding:20px'>No se encontraron coincidencias.</p>";
            data.forEach(d => {
                list.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:start">
                            <div>
                                <h3 style="color:var(--primary)">UF ${d.UF}</h3>
                                <p style="font-size:0.85em; color:#8696a0; margin-bottom:2px"><b>P:</b> ${d.Propietario || 'S/D'}</p>
                                <p style="font-size:0.85em; color:#8696a0"><b>I:</b> ${d.Inquilino || 'S/D'}</p>
                            </div>
                            <div style="display:flex; gap:8px">
                                <button class="btn btn-success" style="padding:8px 12px" onclick="window.openNew('${d.id}', '${d.UF}')"><i class="fas fa-plus"></i></button>
                                <button class="btn btn-primary" onclick="window.verHist('${d.id}', '${d.UF}')"><i class="fas fa-history"></i></button>
                            </div>
                        </div>
                        <div id="det-${d.id}" class="hidden" style="margin-top:12px; border-top:1px solid var(--border); padding-top:10px"></div>
                    </div>`;
            });
        }

        /* 🚀 FUNCIÓN DE BÚSQUEDA MANUAL */
        const ejecutarBusqueda = () => {
            const v = document.getElementById('search-input').value.toLowerCase().trim();
            if(!v) { render(departamentos); return; }
            
            const filtered = departamentos.filter(d => {
                const uf = String(d.UF || "").toLowerCase();
                const prop = String(d.Propietario || "").toLowerCase();
                const inq = String(d.Inquilino || "").toLowerCase();
                return uf.includes(v) || prop.includes(v) || inq.includes(v);
            });
            render(filtered);
            window.scrollTo(0,0);
        };

        document.getElementById('btn-do-search').onclick = ejecutarBusqueda;
        
        document.getElementById('search-input').onkeypress = (e) => {
            if (e.key === 'Enter') {
                ejecutarBusqueda();
                document.getElementById('search-input').blur(); 
            }
        };

        /* ❌ BOTÓN LIMPIAR (X ROJA) */
        document.getElementById("btn-clear").onclick = () => { 
            document.getElementById("search-input").value = ""; 
            render(departamentos); 
        };

        /* 🔄 BOTÓN ACTUALIZAR (Refresca y limpia búsqueda) */
        document.getElementById("btn-refresh").onclick = () => {
            document.getElementById("search-input").value = ""; // Limpia el campo
            window.loadData(); // Carga todo de nuevo
        };

        /* --- ACCIONES DE FIREBASE --- */
        window.openNew = (id, uf) => {
            currentUFId = id; currentRepDocId = null;
            document.getElementById("m-title").innerText = "Nueva Tarea UF " + uf;
            document.getElementById("r-descripcion").value = "";
            document.getElementById("r-ejecutor").value = "";
            document.getElementById("r-estado").value = "Pendiente";
            document.getElementById("r-responsable").value = "Consorcio";
            document.getElementById("modal-edit").classList.remove("hidden");
        };

        window.editSpecific = async (docId, uf) => {
            currentRepDocId = docId;
            document.getElementById("m-title").innerText = "Modificar - UF " + uf;
            try {
                const docSnap = await getDoc(doc(db, "reparaciones", docId));
                if (docSnap.exists()) {
                    const r = docSnap.data();
                    currentUFId = r.id_uf;
                    document.getElementById("r-descripcion").value = r.descripcion || "";
                    document.getElementById("r-ejecutor").value = r.ejecutor || "";
                    document.getElementById("r-estado").value = r.estado || "Pendiente";
                    document.getElementById("r-responsable").value = r.responsable || "Consorcio";
                    document.getElementById("modal-edit").classList.remove("hidden");
                }
            } catch (e) { alert("Error al cargar datos."); }
        };

        window.deleteRep = async (docId, ufId) => {
            if(!confirm("¿Eliminar este registro?")) return;
            const pass = prompt("Código Maestro:");
            if(pass !== CODIGO_MAESTRO) { alert("Incorrecto."); return; }
            try {
                await deleteDoc(doc(db, "reparaciones", docId));
                alert("Eliminado.");
                window.loadData();
            } catch (e) { alert("Error."); }
        };

        window.saveRep = async () => {
            const desc = document.getElementById("r-descripcion").value.trim();
            if(!desc) { alert("Ingrese descripción."); return; }
            const pass = prompt("Código Maestro:");
            if(pass !== CODIGO_MAESTRO) { alert("Incorrecto."); return; }

            const data = {
                id_uf: currentUFId,
                descripcion: desc,
                ejecutor: document.getElementById("r-ejecutor").value.trim(),
                estado: document.getElementById("r-estado").value,
                responsable: document.getElementById("r-responsable").value,
                fecha: new Date().toLocaleDateString()
            };

            try {
                if (currentRepDocId) {
                    await updateDoc(doc(db, "reparaciones", currentRepDocId), data);
                } else {
                    await addDoc(collection(db, "reparaciones"), data);
                }
                window.closeModal();
                window.loadData();
            } catch (e) { alert("Error."); }
        };

        document.getElementById("btn-guardar-principal").onclick = window.saveRep;
        window.closeModal = () => document.getElementById("modal-edit").classList.add("hidden");

        window.verHist = async (id, uf) => {
            const el = document.getElementById("det-" + id);
            el.classList.toggle("hidden");
            if(!el.classList.contains("hidden")) {
                el.innerHTML = "<p style='font-size:0.8em; text-align:center; color:#aaa'>Buscando...</p>";
                try {
                    const q = query(collection(db, "reparaciones"), where("id_uf", "==", id));
                    const snap = await getDocs(q);
                    el.innerHTML = snap.empty ? "<p style='font-size:0.8em; text-align:center; color:var(--warning)'>Sin registros.</p>" : "";
                    snap.forEach(ds => {
                        const r = ds.data();
                        const cl = r.estado === "Pendiente" ? "st-pendiente" : (r.estado === "En Proceso" ? "st-en-proceso" : "st-terminado");
                        el.innerHTML += `
                            <div class="hist-item ${cl}">
                                <div style="display:flex; justify-content:space-between; align-items:center">
                                    <div style="flex:1; padding-right:10px">
                                        <b>${r.fecha}</b> - ${r.descripcion}<br>
                                        <small style="color:#aaa">Resp: ${r.responsable} | Téc: ${r.ejecutor || '-'}</small>
                                    </div>
                                    <div style="display:flex; gap:5px">
                                        <button class="btn btn-primary" style="padding:6px 10px; font-size:0.8em" onclick="window.editSpecific('${ds.id}', '${uf}')"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-danger" style="padding:6px 10px; font-size:0.8em" onclick="window.deleteRep('${ds.id}', '${id}')"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            </div>`;
                    });
                } catch (e) { el.innerHTML = "Error."; }
            }
        };

        window.loadData();
    </script>
</body>
</html>
