<button id="btn-rocket" class="btn primary"><i class="fas fa-rocket"></i></button>

<script type="module">
    // ... (Inicialización de Firebase y variables igual) ...

    // --- 1. RESTAURACIÓN DEL COHETE ---
    // Controla la visibilidad al hacer scroll
    window.onscroll = () => { 
        const rocket = document.getElementById("btn-rocket");
        if (rocket) {
            rocket.style.display = (window.scrollY > 300) ? "flex" : "none"; 
        }
    };
    // Acción de volver al inicio
    document.getElementById("btn-rocket").onclick = () => {
        window.scrollTo({top: 0, behavior: 'smooth'});
        writeLog("Volviendo al principio", "info");
    };

    // --- 2. CORRECCIÓN BOTÓN RESPALDO (EXPORTACIÓN) ---
    // La función askConfirm ya estaba preparada, pero faltaba asegurar la ejecución
    const btnExp = document.getElementById("btn-export");
    if(btnExp) {
        btnExp.onclick = () => {
            // Llama al modal de confirmación con la acción 'export'
            window.askConfirm("¿Desea descargar un respaldo en CSV?", "export");
        };
    }

    // --- 3. CORRECCIÓN BOTÓN CERRAR (MODAL DE ADVERTENCIA) ---
    // Cambiamos la lógica del botón CERRAR de la cabecera para que abra el modal
    const btnCerrarApp = document.getElementById("btn-logout-trigger");
    if(btnCerrarApp) {
        btnCerrarApp.onclick = () => {
            const modalLogout = document.getElementById("modal-logout");
            if(modalLogout) {
                modalLogout.classList.remove("hidden"); // Muestra el cartel de la foto
                writeLog("Solicitud de cierre de sesión", "warn");
            }
        };
    }

    // Lógica del botón SALIR dentro del modal
    document.getElementById("btn-logout-confirm").onclick = () => {
        writeLog("Sesión cerrada de forma segura", "warn");
        localStorage.clear(); // Limpia la autenticación
        location.reload();    // Recarga para volver al login
    };

    // --- AJUSTE EN btn-confirm-yes PARA EXPORTACIÓN ---
    // Asegúrate de que la lógica de exportación dentro de btn-confirm-yes sea esta:
    document.getElementById("btn-confirm-yes").onclick = async () => {
        if(document.getElementById("confirm-pass").value !== MASTER_CODE) {
            writeLog("Autorización fallida", "err");
            return alert("Clave Incorrecta");
        }
        document.getElementById("modal-confirm").classList.add("hidden");

        if(pendingAction.type === 'export') {
            try {
                // Genera el contenido CSV
                const encabezados = "UF,Propietario,TelProp,Inquilino,TelInq\n";
                const filas = departamentos.map(d => 
                    `"${d.UF}","${d.Propietario || ''}","${d.TelefonoPropietario || ''}","${d.Inquilino || ''}","${d.TelefonoInquilino || ''}"`
                ).join("\n");
                
                const csvContent = encabezados + filas;
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Respaldo_UF_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                writeLog("Respaldo CSV generado con éxito", "success");
            } catch (err) {
                writeLog("Error al exportar: " + err.message, "err");
            }
        } 
        // ... (resto de acciones como delete o deleteAll)
    };

</script>
