<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
    <title>Gestión Reparaciones Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b141a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="icono.png">
    <link rel="apple-touch-icon" href="icono.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; 
            --text: #e9edef; --border: #222d34; --success: #22c55e; --warning: #f59e0b;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; scroll-behavior: smooth; }
        .wrap { width: 95%; max-width: 450px; position: relative; padding-top: 160px; padding-bottom: 80px; }
        .hidden { display: none !important; }
        
        /* Header Fijo */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); }
        .search-box { display: flex; gap: 8px; margin-top: 10px; }
        
        /* Botón Flotante */
        #btn-rocket {
            position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px;
            background: var(--primary); color: white; border-radius: 50%; border: none;
            font-size: 1.5em; cursor: pointer; display: none; z-index: 2000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); align-items: center; justify-content: center;
        }

        /* UI Elements */
        input, select, textarea { width: 100%; padding: 12px; background: #1d2a33; border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none; margin-bottom: 10px; font-size: 16px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }

        /* Estados de Reparación */
        .hist-item { background: #1a242d; padding: 12px; margin-top: 8px; border-radius: 8px; font-size: 0.9em; border-left: 5px solid #ccc; }
        .st-pendiente { border-left-color: var(--danger); background: rgba(225,29,72,0.1); }
        .st-en-proceso { border-left-color: var(--warning); background: rgba(245,158,11,0.1); }
        .st-terminado { border-left-color: var(--success); background: rgba(34,197,94,0.1); }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

    <button id="btn-rocket" onclick="window.scrollTo(0,0)"><i class="fas fa-rocket"></i></button>

    <div class="wrap">
        <header class="main-header">
            <h2 style="display:flex; justify-content:space-between; align-items:center">
                Reparaciones <button class="btn btn-primary" id="btn-refresh"><i class="fas fa-sync"></i></button>
            </h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Buscar UF o Propietario...">
                <button class="btn btn-primary" id="btn-search"><i class="fas fa-search"></i></button>
                <button class="btn btn-danger" id="btn-clear"><i class="fas fa-times"></i></button>
            </div>
        </header>
        <div id="listado">Cargando...</div>
    </div>

    <div id="modal-edit" class="modal hidden">
        <div class="modal-content">
            <h3 id="m-title" style="margin-bottom:15px; color:var(--primary)">Trabajo</h3>
            <label>Descripción:</label>
            <textarea id="r-descripcion" rows="3"></textarea>
            <label>Técnico:</label>
            <input type="text" id="r-ejecutor">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div>
                    <label>Estado:</label>
                    <select id="r-estado">
                        <option value="Pendiente">Pendiente</option>
                        <option value="En Proceso">En Proceso</option>
                        <option value="Terminado">Terminado</option>
                    </select>
                </div>
                <div>
                    <label>Responsable:</label>
                    <select id="r-responsable">
                        <option value="Consorcio">Consorcio</option>
                        <option value="Propietario">Propietario</option>
                    </select>
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:15px">
                <button class="btn btn-danger" style="flex:1" onclick="window.closeModal()">Cerrar</button>
                <button class="btn btn-success" style="flex:1" onclick="window.saveRep()">Guardar</button>
            </div>
        </div>
    </div>

    <script type="module">
        // --- 1. REGISTRO DE SERVICE WORKER FÍSICO ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW activo para instalación'))
                    .catch(err => console.log('Error SW:', err));
            });
        }

        // --- 2. LÓGICA DE FIREBASE ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, query, where, updateDoc, doc, addDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo",
            authDomain: "gestionuf-remoto.firebaseapp.com",
            projectId: "gestionuf-remoto",
            storageBucket: "gestionuf-remoto.appspot.com",
            messagingSenderId: "724452752860",
            appId: "1:724452752860:web:4d25585addcdcbd146e319"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let departamentos = [];
        let currentUFId = null;
        let currentRepDocId = null;

        // Scroll Rocket
        window.onscroll = () => {
            document.getElementById("btn-rocket").style.display = window.scrollY > 300 ? "flex" : "none";
        };

        // Cargar Datos
        window.loadData = async () => {
            const list = document.getElementById("listado");
            list.innerHTML = "Sincronizando...";
            try {
                const snap = await getDocs(query(collection(db, "departamentos"), orderBy("UF", "asc")));
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            } catch (e) { console.error(e); list.innerHTML = "Error de conexión"; }
        };

        function render(data) {
            const list = document.getElementById("listado");
            list.innerHTML = data.length ? "" : "No hay resultados";
            data.forEach(d => {
                list.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:start">
                            <div>
                                <h3 style="color:var(--primary)">UF ${d.UF}</h3>
                                <p><i class="fas fa-user"></i> ${d.Propietario || '---'}</p>
                            </div>
                            <div style="display:flex; gap:8px">
                                <button title="Nuevo" class="btn btn-success" onclick="window.openNew('${d.id}', '${d.UF}')"><i class="fas fa-plus"></i></button>
                                <button title="Gestionar" class="btn btn-primary" onclick="window.verHist('${d.id}', '${d.UF}')"><i class="fas fa-history"></i></button>
                            </div>
                        </div>
                        <div id="det-${d.id}" class="hidden" style="margin-top:10px; border-top:1px solid var(--border); padding-top:10px"></div>
                    </div>`;
            });
        }

        window.openNew = (id, uf) => {
            currentUFId = id; currentRepDocId = null;
            document.getElementById("m-title").innerText = "Nueva Reparación UF " + uf;
            document.getElementById("r-descripcion").value = "";
            document.getElementById("r-ejecutor").value = "";
            document.getElementById("r-estado").value = "Pendiente";
            document.getElementById("modal-edit").classList.remove("hidden");
        };

        window.editSpecific = async (docId, uf) => {
            currentRepDocId = docId;
            document.getElementById("m-title").innerText = "Editando - UF " + uf;
            try {
                const docSnap = await getDoc(doc(db, "reparaciones", docId));
                if (docSnap.exists()) {
                    const r = docSnap.data();
                    currentUFId = r.id_uf;
                    document.getElementById("r-descripcion").value = r.descripcion || "";
                    document.getElementById("r-ejecutor").value = r.ejecutor || "";
                    document.getElementById("r-estado").value = r.estado || "Pendiente";
                    document.getElementById("r-responsable").value = r.responsable || "Consorcio";
                    document.getElementById("modal-edit").classList.remove("hidden");
                }
            } catch (e) { console.error(e); }
        };

        window.saveRep = async () => {
            const data = {
                id_uf: currentUFId,
                descripcion: document.getElementById("r-descripcion").value,
                ejecutor: document.getElementById("r-ejecutor").value,
                estado: document.getElementById("r-estado").value,
                responsable: document.getElementById("r-responsable").value,
                fecha: new Date().toLocaleDateString()
            };
            try {
                if (currentRepDocId) await updateDoc(doc(db, "reparaciones", currentRepDocId), data);
                else await addDoc(collection(db, "reparaciones"), data);
                window.closeModal();
                window.loadData();
            } catch (e) { alert("Error al guardar"); }
        };

        window.closeModal = () => document.getElementById("modal-edit").classList.add("hidden");

        window.verHist = async (id, uf) => {
            const el = document.getElementById("det-" + id);
            el.classList.toggle("hidden");
            if(!el.classList.contains("hidden")) {
                el.innerHTML = "Cargando...";
                try {
                    const q = query(collection(db, "reparaciones"), where("id_uf", "==", id));
                    const snap = await getDocs(q);
                    el.innerHTML = snap.empty ? "Sin registros" : "";
                    snap.forEach(ds => {
                        const r = ds.data();
                        const cl = r.estado === "Pendiente" ? "st-pendiente" : (r.estado === "En Proceso" ? "st-en-proceso" : "st-terminado");
                        el.innerHTML += `
                            <div class="hist-item ${cl}">
                                <div style="display:flex; justify-content:space-between">
                                    <div style="flex:1"><b>${r.fecha}:</b> ${r.descripcion}</div>
                                    <button class="btn btn-primary" style="padding:5px 8px" onclick="window.editSpecific('${ds.id}', '${uf}')"><i class="fas fa-edit"></i></button>
                                </div>
                            </div>`;
                    });
                } catch (e) { el.innerHTML = "Error al leer historial"; }
            }
        };

        // Buscador y Botones
        document.getElementById("btn-search").onclick = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            render(departamentos.filter(d => d.UF.toString().toLowerCase().includes(v) || d.Propietario.toLowerCase().includes(v)));
        };
        document.getElementById("btn-clear").onclick = () => { document.getElementById("search-input").value = ""; render(departamentos); };
        document.getElementById("btn-refresh").onclick = () => window.loadData();

        window.loadData();
    </script>
</body>
</html>
