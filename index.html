<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
    <title>Gestión Reparaciones Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b141a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; 
            --text: #e9edef; --border: #222d34; --success: #22c55e; --warning: #f59e0b;
            --label: #8696a0;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; scroll-behavior: smooth; }
        .wrap { width: 95%; max-width: 450px; position: relative; padding-top: 170px; padding-bottom: 80px; }
        .hidden { display: none !important; }

        .btn-home {
            position: fixed; top: 15px; left: 15px; z-index: 9999999;
            background: rgba(37, 99, 235, 0.9); color: white; border: none;
            border-radius: 50%; width: 45px; height: 45px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex;
            align-items: center; justify-content: center; text-decoration: none;
        }
        
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); }
        .nav-top { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 15px; gap: 10px; }
        
        .btn-stat-header { background: rgba(37, 99, 235, 0.1); border: 1px solid var(--primary); color: white; border-radius: 8px; padding: 0 12px; height: 45px; display: flex; align-items: center; gap: 8px; font-weight: bold; cursor: pointer; }

        .search-box { display: flex; gap: 5px; align-items: center; }
        .search-box input { flex: 1; margin-bottom: 0; background: #1d2a33; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: #fff; font-size: 16px; }
        .btn-search-trigger { background: var(--primary); color: white; border: none; border-radius: 8px; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1em; }
        .btn-clear-trigger { background: var(--danger); color: white; border: none; border-radius: 8px; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1em; }
        
        #btn-rocket { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--primary); color: white; border-radius: 50%; border: none; font-size: 1.5em; cursor: pointer; display: none; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); align-items: center; justify-content: center; }

        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); border-left: 6px solid transparent; }
        .status-pendiente { border-left-color: var(--danger) !important; }
        .status-proceso { border-left-color: var(--warning) !important; }
        .status-terminado { border-left-color: var(--success) !important; }

        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }

        .hist-item { background: #1a242d; padding: 12px; margin-top: 8px; border-radius: 8px; font-size: 0.9em; border-left: 5px solid #ccc; }
        .st-pendiente { border-left-color: var(--danger); }
        .st-en-proceso { border-left-color: var(--warning); }
        .st-terminado { border-left-color: var(--success); }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); max-height: 90vh; overflow-y: auto; }

        .ficha-hub { background: #1c272e; border: 1px solid #2a3942; border-radius: 12px; padding: 15px; margin-bottom: 10px; text-align: left; }
        .campo-hub { display: flex; align-items: baseline; gap: 10px; margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 3px; }
        .lbl-hub { color: var(--label); font-size: 10px; text-transform: uppercase; font-weight: 800; min-width: 45px; }
        .val-hub { color: #fff; font-size: 13px; font-weight: 600; flex: 1; }
        .val-tarea { color: var(--warning); font-size: 12px; font-weight: 500; line-height: 1.4; }
    </style>
</head>
<body>

    <a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/" class="btn-home"><i class="fas fa-home"></i></a>
    <button id="btn-rocket" onclick="window.scrollTo({top:0, behavior:'smooth'})"><i class="fas fa-rocket"></i></button>

    <div class="wrap">
        <header class="main-header">
            <div class="nav-top">
                <h2 style="font-size: 1.1em; color: var(--primary); margin-right: auto; padding-left: 50px;">Reparaciones</h2>
                <div class="btn-stat-header" onclick="window.openGlobal()">
                    <i class="fas fa-tools" style="color:var(--primary)"></i>
                    <span id="total-activas">0</span>
                </div>
                <button class="btn btn-primary" id="btn-refresh"><i class="fas fa-sync"></i></button>
            </div>
            
            <div class="search-box">
                <input type="text" id="search-input" placeholder="UF, Prop o Estado (Pen, Proc)..." autocomplete="off">
                <button class="btn-clear-trigger" id="btn-clear"><i class="fas fa-times"></i></button>
                <button class="btn-search-trigger" id="btn-do-search"><i class="fas fa-search"></i></button>
            </div>
        </header>
        <div id="listado">Cargando unidades...</div>
    </div>

    <div id="modal-seguridad" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <h3>Seguridad Requerida</h3>
            <input type="password" id="input-maestro" placeholder="••••" inputmode="numeric" style="text-align:center; font-size:24px; width:100%; padding:10px; margin:20px 0; background:#1d2a33; color:#fff; border-radius:8px; border:1px solid var(--border)">
            <div style="display:flex; gap:10px">
                <button class="btn btn-primary" style="flex:1" id="confirm-autorizar">AUTORIZAR</button>
                <button class="btn btn-danger" style="flex:1" onclick="document.getElementById('modal-seguridad').classList.add('hidden')">VOLVER</button>
            </div>
        </div>
    </div>

    <div id="modal-global" class="modal hidden">
        <div class="modal-content">
            <h3 style="color:var(--primary); text-align:center; margin-bottom:15px">Obras Activas</h3>
            <div id="lista-global" style="max-height: 400px; overflow-y: auto; margin: 15px 0;"></div>
            <button class="btn btn-danger" style="width:100%" onclick="document.getElementById('modal-global').classList.add('hidden')">Cerrar</button>
        </div>
    </div>

    <div id="modal-edit" class="modal hidden">
        <div class="modal-content">
            <h3 id="m-title" style="margin-bottom:15px; color:var(--primary)">Trabajo</h3>
            <label>Descripción:</label>
            <textarea id="r-descripcion" rows="3" style="width:100%; padding:10px; background:#1d2a33; color:#fff; border-radius:8px; border:1px solid var(--border); margin-bottom:10px"></textarea>
            <label>Técnico:</label>
            <input type="text" id="r-ejecutor" style="width:100%; padding:10px; background:#1d2a33; color:#fff; border-radius:8px; border:1px solid var(--border); margin-bottom:10px">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <select id="r-estado" style="padding:10px; background:#1d2a33; color:#fff; border-radius:8px">
                    <option value="Pendiente">Pendiente</option>
                    <option value="En Proceso">En Proceso</option>
                    <option value="Terminado">Terminado</option>
                </select>
                <select id="r-responsable" style="padding:10px; background:#1d2a33; color:#fff; border-radius:8px">
                    <option value="Consorcio">Consorcio</option>
                    <option value="Propietario">Propietario</option>
                </select>
            </div>
            <div style="display:flex; gap:10px; margin-top:15px">
                <button class="btn btn-danger" style="flex:1" onclick="window.closeModal()">Cerrar</button>
                <button class="btn btn-success" style="flex:1" id="btn-save-action">Guardar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc, orderBy, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const CODIGO_MAESTRO = "4750"; 
        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let departamentos = [];
        let reparacionesGlobales = [];
        let mapaDeptos = {};
        let currentUFId, currentRepDocId, pendingAction;

        window.onscroll = () => { document.getElementById("btn-rocket").style.display = window.scrollY > 300 ? "flex" : "none"; };

        onSnapshot(collection(db, "reparaciones"), (snap) => {
            reparacionesGlobales = snap.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById("total-activas").innerText = reparacionesGlobales.filter(r => ["Pendiente", "En Proceso"].includes(r.estado)).length;
            // No ejecutamos búsqueda automática aquí para evitar lentitud
        });

        window.loadData = async () => {
            const snap = await getDocs(query(collection(db, "departamentos"), orderBy("UF", "asc")));
            departamentos = snap.docs.map(d => {
                const data = { id: d.id, ...d.data() };
                mapaDeptos[d.id] = data;
                return data;
            });
            render(departamentos);
        };

        function render(data) {
            const list = document.getElementById("listado");
            list.innerHTML = "";
            data.forEach(d => {
                const repsUF = reparacionesGlobales.filter(r => r.id_uf === d.id);
                let stClass = "";
                if (repsUF.some(r => r.estado === "Pendiente")) stClass = "status-pendiente";
                else if (repsUF.some(r => r.estado === "En Proceso")) stClass = "status-proceso";
                else if (repsUF.length > 0 && repsUF.every(r => r.estado === "Terminado")) stClass = "status-terminado";

                list.innerHTML += `
                    <div class="card ${stClass}">
                        <div style="display:flex; justify-content:space-between; align-items:start">
                            <div>
                                <h3 style="color:var(--primary)">UF ${d.UF}</h3>
                                <p style="font-size:0.85em; color:#8696a0"><b>P:</b> ${d.Propietario || 'S/D'}</p>
                                <p style="font-size:0.85em; color:#8696a0"><b>I:</b> ${d.Inquilino || 'S/D'}</p>
                            </div>
                            <div style="display:flex; gap:8px">
                                <button class="btn btn-success" style="padding:10px 15px" onclick="window.openNew('${d.id}', '${d.UF}')"><i class="fas fa-plus"></i></button>
                                <button class="btn btn-primary" style="padding:10px 15px" onclick="window.verHist('${d.id}', '${d.UF}')"><i class="fas fa-history"></i></button>
                            </div>
                        </div>
                        <div id="det-${d.id}" class="hidden" style="margin-top:12px; border-top:1px solid var(--border); padding-top:10px"></div>
                    </div>`;
            });
        }

        // Lógica de búsqueda manual con la Lupa
        const ejecutarBusqueda = () => {
            const v = document.getElementById('search-input').value.toLowerCase().trim();
            if(!v) { render(departamentos); return; }
            
            const filtrados = departamentos.filter(d => {
                const cumpleTexto = String(d.UF).includes(v) || 
                                   String(d.Propietario || "").toLowerCase().includes(v) || 
                                   String(d.Inquilino || "").toLowerCase().includes(v);
                
                const reps = reparacionesGlobales.filter(r => r.id_uf === d.id);
                const cumpleEstado = (v === "pen" || v === "pendiente") ? reps.some(r => r.estado === "Pendiente") :
                                     (v === "proc" || v === "proceso") ? reps.some(r => r.estado === "En Proceso") : false;

                return cumpleTexto || cumpleEstado;
            });
            render(filtrados);
            window.scrollTo(0,0);
        };

        // Eventos de búsqueda (Manual)
        document.getElementById('btn-do-search').onclick = ejecutarBusqueda;
        document.getElementById('search-input').onkeypress = (e) => { 
            if (e.key === 'Enter') {
                ejecutarBusqueda();
                document.getElementById('search-input').blur(); // Oculta el teclado
            }
        };

        window.openGlobal = () => {
            const list = document.getElementById("lista-global");
            list.innerHTML = "";
            reparacionesGlobales.filter(r => ["Pendiente", "En Proceso"].includes(r.estado)).forEach(r => {
                const depto = mapaDeptos[r.id_uf] || { UF: '??', Propietario: '-', Inquilino: '-' };
                list.innerHTML += `
                    <div class="ficha-hub" style="border-left: 4px solid ${r.estado === 'Pendiente' ? 'var(--danger)' : 'var(--warning)'}">
                        <div class="campo-hub"><span class="lbl-hub">UF:</span><span class="val-hub">${depto.UF}</span></div>
                        <div class="campo-hub"><span class="lbl-hub">Prop:</span><span class="val-hub">${depto.Propietario || '-'}</span></div>
                        <div class="campo-hub"><span class="lbl-hub">Inq:</span><span class="val-hub">${depto.Inquilino || '-'}</span></div>
                        <div class="campo-hub" style="border:none"><span class="lbl-hub">Tarea:</span><span class="val-tarea">${r.descripcion}</span></div>
                    </div>`;
            });
            document.getElementById("modal-global").classList.remove("hidden");
        };

        const solicitarSeguridad = (callback) => {
            pendingAction = callback;
            document.getElementById("input-maestro").value = "";
            document.getElementById("modal-seguridad").classList.remove("hidden");
        };

        document.getElementById("confirm-autorizar").onclick = () => {
            if(document.getElementById("input-maestro").value === CODIGO_MAESTRO) {
                document.getElementById("modal-seguridad").classList.add("hidden");
                if(pendingAction) pendingAction();
            } else { alert("Incorrecto"); }
        };

        document.getElementById("btn-save-action").onclick = () => {
            solicitarSeguridad(async () => {
                const data = {
                    id_uf: currentUFId,
                    descripcion: document.getElementById("r-descripcion").value,
                    ejecutor: document.getElementById("r-ejecutor").value,
                    estado: document.getElementById("r-estado").value,
                    responsable: document.getElementById("r-responsable").value,
                    fecha: new Date().toLocaleDateString()
                };
                if (currentRepDocId) await updateDoc(doc(db, "reparaciones", currentRepDocId), data);
                else await addDoc(collection(db, "reparaciones"), data);
                window.closeModal();
                ejecutarBusqueda(); // Refresca la vista actual tras guardar
            });
        };

        window.deleteRep = (docId) => solicitarSeguridad(async () => { 
            await deleteDoc(doc(db, "reparaciones", docId)); 
            ejecutarBusqueda(); 
        });

        window.openNew = (id, uf) => { currentUFId = id; currentRepDocId = null; document.getElementById("m-title").innerText = "Nueva UF " + uf; document.getElementById("r-descripcion").value = ""; document.getElementById("modal-edit").classList.remove("hidden"); };
        window.closeModal = () => document.getElementById("modal-edit").classList.add("hidden");

        window.verHist = async (id, uf) => {
            const el = document.getElementById("det-" + id);
            el.classList.toggle("hidden");
            if(!el.classList.contains("hidden")) {
                const snap = reparacionesGlobales.filter(r => r.id_uf === id);
                el.innerHTML = snap.length ? "" : "<p style='font-size:0.8em; color:var(--warning)'>Sin registros.</p>";
                snap.forEach(r => {
                    const cl = r.estado === "Pendiente" ? "st-pendiente" : (r.estado === "En Proceso" ? "st-en-proceso" : "st-terminado");
                    el.innerHTML += `<div class="hist-item ${cl}">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <small>${r.fecha} - ${r.descripcion}</small>
                            <button class="btn btn-danger" style="padding:4px 8px" onclick="window.deleteRep('${r.id}')"><i class="fas fa-trash"></i></button>
                        </div></div>`;
                });
            }
        };

        document.getElementById("btn-clear").onclick = () => { 
            document.getElementById("search-input").value = ""; 
            render(departamentos); 
        };

        document.getElementById("btn-refresh").onclick = () => window.loadData();
        window.loadData();
    </script>
</body>
</html>
